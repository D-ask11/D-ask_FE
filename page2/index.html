<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-ask Chat</title>
    <link rel="stylesheet" href="../common/reset.css">
    <link rel="stylesheet" href="../common/common.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/1429680651.js" crossorigin="anonymous"></script>

</head>
<body>
    <div class="container">

        <header>
        <div class="header">
            <a href="../mainpage/index.html"><img src="../img/Dask_logosmall.png" alt=""></a>
        </div>
    </header>

        <!-- Chat Area -->
        <main class="chat-area" id="chatArea">
            <!-- Messages will be inserted here -->
        </main>

        <!-- Input Area -->
        <footer class="input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    class="input-field" 
                    id="messageInput"
                    placeholder="학교에 대해 궁금한 점이 있나요?"
                    autocomplete="off"
                >
                <button class="send-btn" id="sendBtn" disabled>
                    <i class="fa-regular fa-paper-plane"></i>
                </button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
