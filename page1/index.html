<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-ask</title>
    <link rel="stylesheet" href="../common/reset.css">
    <link rel="stylesheet" href="../common/common.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">


        <!-- Main Content -->
        <main class="main-content">
            <!-- Center Logo -->
            <div class="center-logo">
                <div class="logo">
                    <div class="logo-icon logo-icon--large"></div>
                    <span class="logo-text logo-text--large">-ask</span>
                </div>
            </div>

            <!-- Search Input -->
            <div class="search-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        class="input-field" 
                        id="searchInput"
                        placeholder="학교에 대해 궁금한 점이 있나요?"
                        autocomplete="off"
                    >
                    <button class="send-btn" id="sendBtn" disabled>
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>

                <!-- Suggestion Buttons -->
                <div class="suggestions">
                    <button class="suggestion-btn" data-query="DMS 인증제에 대해 알려줘">
                        <span>DMS 인증제에 대해 알려줘</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35"/>
                        </svg>
                    </button>
                    <button class="suggestion-btn" data-query="인증제 한 학기에 독서록 몇개 작성해야해?">
                        <span>인증제 한 학기에 독서록 몇개 작성해야해?</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35"/>
                        </svg>
                    </button>
                    <button class="suggestion-btn" data-query="영화를 봤는데 인증제에 올릴 수 있어?">
                        <span>영화를 봤는데 인증제에 올릴 수 있어?</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
