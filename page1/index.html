<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-ask</title>
    <link rel="stylesheet" href="../common/reset.css">
    <link rel="stylesheet" href="../common/common.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/1429680651.js" crossorigin="anonymous"></script>
    <link rel="icon" href="../img/Dask_logo.svg" />

</head>
<body>
    <div class="container">

        <header>
        <div class="header">
            <a href="../index.html"><img src="../img/Dask_logosmall.png" alt=""></a>
        </div>
    </header>


        <!-- Main Content -->
        <main class="main-content">
            <!-- Center Logo -->
            <div class="center-logo">
                <div class="logo">
                    <img src="../img/Dask_logofull.png" alt="D-ask">
                </div>
            </div>

            <!-- Search Input -->
            <div class="search-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        class="input-field" 
                        id="searchInput"
                        placeholder="학교에 대해 궁금한 점이 있나요?"
                        autocomplete="off"
                    >
                    <button class="send-btn" id="sendBtn" disabled>
                        <i class="fa-regular fa-paper-plane"></i>
                    </button>
                </div>

                <!-- Suggestion Buttons -->
                <div class="suggestions">
                    <button class="suggestion-btn" data-query="DMS 인증제에 대해 알려줘">
                        <span>DMS 인증제에 대해 알려줘</span>
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <button class="suggestion-btn" data-query="인증제 한 학기에 독서록 몇개 작성해야해?">
                        <span>인증제 한 학기에 독서록 몇개 작성해야해?</span>
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <button class="suggestion-btn" data-query="영화를 봤는데 인증제에 올릴 수 있어?">
                        <span>영화를 봤는데 인증제에 올릴 수 있어?</span>
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
