<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-ask</title>
    <link rel="stylesheet" href="./reset.css">
    <link rel="stylesheet" href="./main_style.css">
    <link rel="stylesheet" href="./QnA_style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" href="./img/Dask_logo.svg" type="image/x-icon">

</head>
<body>

  <header class="header">
        <div class="logo">
          <a href="./main_page.html">
            <img src="./img/Dask_logosmall.png" alt="">
          </a>
        </div>
  </header>

  <div class="logo-full">
    <img src="./img/Dask_logofull.png" alt="D-ask 로고">
  </div>

  <div class="search-container">
    <input type="text" class="search-input" id="searchInput" placeholder="학교에 대해 궁금한 점이 있나요?">
    <button class="send-button" id="sendBtn">
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>

  <div class="suggestions">
    <button class="suggestion-btn" data-text="DMS 인증제에 대해 알려줘">
      <span>DMS 인증제에 대해 알려줘</span>
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>
    <button class="suggestion-btn" data-text="인증제 한 학기에 독서록 몇 개 작성해야해?">
      <span>인증제 한 학기에 독서록 몇 개 작성해야해?</span>
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>
    <button class="suggestion-btn" data-text="영화를 봤는데 인증제에 올릴 수 있어?">
      <span>영화를 봤는데 인증제에 올릴 수 있어?</span>
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>
  </div>

  <script src="./QnA_scrip.js"></script>

</body>
</html>
