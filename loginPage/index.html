<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <header class="header">
  <div class="header-logo">
    <a href="../index.html">
    <img src="../img/Dask_logosmall.png" alt="로고" class="header-logo-img">
    </a>
  </div>
</header>

    <div class="login-wrapper">
        <div class="login-card">
            <h2 class="login-title">로그인</h2>
            
            <div class="login-buttons">
                <button class="btn-login btn-google" type="button">
                    <span class="icon-wrapper"><img src="../img/fsearch-281764 1.png" alt=""></span>
                    Google로 로그인하기
                </button>
                <button class="btn-login btn-kakao" type="button">
                    <span class="icon-wrapper"><img src="../img/kakao-talk-3669973 1.png" alt=""></span>
                    카카오로 로그인하기
                </button>
                <button class="btn-login btn-naver" type="button">
                    <span class="icon-wrapper"><img src="../img/naver_icon 1.png" alt=""></span>
                    네이버로 로그인하기
                </button>
            </div>
        </div>
    </div>
</body>
</html>
