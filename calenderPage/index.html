<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학사일정 캘린더</title>
  <link rel="stylesheet" href="./reset.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/1429680651.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="calendar-container">
    <div class="calendar-header">
      <div class="nav-container">
        <button class="nav-btn" id="prevBtn"><i class="fa-solid fa-angle-left"></i></button>
        <span class="current-month" id="currentMonth"></span>
        <button class="nav-btn" id="nextBtn"><i class="fa-solid fa-angle-right"></i></button>
      </div>ㄴㄴㄴㄴ
    </div>
    <div class="calendar-body">
      <div class="weekdays">
        <span>일</span>
        <span>월</span>
        <span>화</span>
        <span>수</span>
        <span>목</span>
        <span>금</span>
        <span>토</span>
      </div>
      <div class="days" id="daysContainer"></div>
    </div>
    <div class="event-panel" id="eventPanel">
      <h3 id="eventDate">날짜를 선택하세요</h3>
      <div id="eventList">
        <p class="no-event">날짜를 클릭하면 일정이 표시됩니다.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  
</body>
</html>
